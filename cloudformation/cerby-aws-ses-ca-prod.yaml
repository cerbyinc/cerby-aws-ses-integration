AWSTemplateFormatVersion: "2010-09-09"

Description: Cerby AWS SES Integration. This template creates the resources required to connect Cerby with your AWS SES service.

Parameters:
  EmailAddress:
    Type: String
    Description: The email address to use to forward message

  ExternalId:
    Type: String
    Description: The external id to use along with the role

  RoleName:
    Type: String
    Description: The name of the role to create

Resources:
  CerbyRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - "arn:aws:iam::233903268318:role/customer-assumable-roles"
            Action:
              - "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId
      Policies:
        - PolicyName: aws-receipt-rules
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              Action:
                - "ses:CreateReceiptRule"
                - "ses:CreateReceiptRuleSet"
                - "ses:DeleteReceiptRule"
                - "ses:DeleteReceiptRuleSet"
                - "ses:DescribeReceiptRule"
                - "ses:DescribeReceiptRuleSet"
              Effect: Allow
              Resource: "*"
        - PolicyName: aws-send-email
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              Action:
                - "ses:sendEmail"
              Effect: Allow
              Resource: "*"
              Condition:
                "StringEquals":
                  "ses:FromAddress": !Ref EmailAddress
